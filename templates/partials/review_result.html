{{define "review_result"}}
<div class="result-card {{if .Correct}}correct{{else}}incorrect{{end}}">
  {{if .Correct}}
  <div class="result-label correct">回答正确</div>
  {{else}}
  <div class="result-label incorrect">再接再厉</div>
  {{end}}

  {{if .Feedback}}
  <div class="result-feedback">{{.Feedback}}</div>
  {{end}}

  <div class="result-next">
    下次复习：{{.NewInterval}} 天后
  </div>

  {{template "ai_explanation" .}}

  <button class="btn-primary"
    hx-get="/review/next"
    hx-target="#quiz-area"
    hx-swap="innerHTML">继续下一个 →</button>
</div>
{{end}}
