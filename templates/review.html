{{define "content"}}
<div class="review-page">
  {{if .Word}}
  <div class="review-header">
    <span class="due-count">📋 待复习 {{.Due}} 个</span>
  </div>
  <div id="quiz-area">
    {{template "quiz_card" .}}
  </div>
  {{else}}
  <div class="done-state">
    <div class="done-icon">✓</div>
    <h2>今日任务完成！</h2>
    <p>所有单词已复习完毕，明天继续加油。</p>
    <a href="/" class="btn-primary">返回单词库</a>
  </div>
  {{end}}
</div>
{{end}}

{{define "quiz_card"}}
{{if .Word}}
<div class="quiz-card" id="quiz-card">
  <div class="quiz-word">{{.Word.Word}}</div>
  {{if .Word.Context}}
  <div class="quiz-context">{{.Word.Context}}</div>
  {{end}}
  <div class="quiz-actions">
    <button class="btn-forgot"
      hx-post="/review/{{.Word.ID}}/forgot"
      hx-target="#quiz-area"
      hx-swap="innerHTML">😕 不记得</button>
    <button class="btn-primary"
      hx-post="/review/{{.Word.ID}}/remember"
      hx-target="#quiz-area"
      hx-swap="innerHTML">👍 记得</button>
  </div>
</div>
{{else}}
<div class="done-state">
  <div class="done-icon">✓</div>
  <h2>今日任务完成！</h2>
  <p>所有单词已复习完毕。</p>
  <a href="/" class="btn-primary">返回单词库</a>
</div>
{{end}}
{{end}}
