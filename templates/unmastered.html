{{define "content"}}
<div class="page-header">
  <h1>生词库</h1>
  <div class="stats">
    <span>共 <strong>{{.Count}}</strong> 个词</span>
    {{if gt .Due 0}}<span class="badge-due">待复习 {{.Due}} 个</span>{{end}}
  </div>
</div>

<div class="search-bar">
  <input type="search" name="q" value="{{.Query}}"
    placeholder="搜索单词..."
    hx-get="/unmastered"
    hx-trigger="keyup changed delay:300ms, search"
    hx-target="#word-list"
    hx-select="#word-list">
</div>

<div id="word-list">
  {{template "word_list_rows" .}}
</div>
{{end}}
