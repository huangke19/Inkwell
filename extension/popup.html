<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 220px; padding: 16px; margin: 0; color: #1e293b; }
    h3 { margin: 0 0 8px; font-size: 15px; }
    p { margin: 0; font-size: 12px; color: #64748b; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; }
    .status { margin-top: 12px; font-size: 12px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 6px; }
    .dot.on { background: #059669; }
  </style>
</head>
<body>
  <h3>✏️ Inkwell</h3>
  <p>在任意网页选中英文单词，点击气泡即可加入词库，同时自动记录页面标题、链接和上下文。</p>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">检查服务中…</span>
  </div>
  <p style="margin-top:8px"><a href="http://localhost:9090" target="_blank">打开 Inkwell</a></p>
  <script src="popup.js"></script>
</body>
</html>
